<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çocuk TV - Canlı Yayın</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">📺 Çocuk TV</div>
    </header>

    <main class="container">
        <section class="player-section">
            <div class="video-container" id="video-container">
                <div class="live-badge" id="live-badge">🔴 CANLI</div>
                
                <video id="tv-player" controls preload="auto"></video>

                <div id="yt-player" style="display: none; width: 100%; height: 100%;"></div>
                
                <div class="error-screen" id="error-screen" style="display: none;">
                    <h2>Şu an yayınımız yok 🛑</h2>
                    <p>Siz de bu saate kadar oyun oynayabilirsiniz çocuklar! 🧸🎮</p>
                    <p id="next-broadcast-info"></p>
                </div>
            </div>

            <button id="go-live-btn" class="go-live-btn" style="display: none;">▶ Canlı Yayına Dön</button>

            <div class="video-info">
                <h1 id="current-title">Yükleniyor...</h1>
                <p id="current-description">Lütfen bekleyin, yayın akışı kontrol ediliyor.</p>
            </div>
        </section>

        <aside class="schedule-section">
            <h2>Yayın Akışı</h2>
            <ul id="schedule-list" class="schedule-list">
                </ul>
        </aside>
    </main>

    <script src="script.js"></script>
</body>
</html>
