<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DmnTV - Çocuk Kanalı</title>
    <link rel="icon" href="image_1.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="header__logo-container">
            <img src="image_1.png" alt="DmnTV Logo" class="header__logo">
        </div>
        <div id="liveClock" class="header__clock">--:--:--</div>
        <button id="fullscreenBtn" class="btn">📺 Tam Ekran</button>
    </header>

    <main class="main">
        <section class="player" id="playerContainer">
            <img src="image_1.png" alt="DmnTV" class="player__watermark">

            <div id="upNextBanner" class="up-next-banner">
                <img src="image_1.png" alt="Logo" class="up-next-banner__logo">
                <div class="up-next-banner__info">
                    <span>Sıradaki:</span>
                    <h4 id="upNextTitle"></h4>
                </div>
            </div>

            <!-- Video alanı -->
            <div id="videoWrapper" class="player__video hidden">
                <div id="ytContainer" style="width:100%;height:100%;display:none;"></div>
                <video id="nativePlayer" style="width:100%;height:100%;display:none;" autoplay playsinline controls></video>
                <iframe id="iframePlayer" style="width:100%;height:100%;border:none;display:none;" allow="autoplay; fullscreen; encrypted-media" allowfullscreen></iframe>
                
                <div id="progressBarContainer" class="progress-container">
                    <div id="progressBar" class="progress-bar"></div>
                    <div class="progress-text">
                        <span id="progressElapsed">00:00</span>
                        <span id="progressRemaining">-00:00</span>
                    </div>
                </div>
            </div>

            <!-- Yayın dışı -->
            <div id="offlineScreen" class="player__screen hidden">
                <div class="screen-emoji">🌙</div>
                <h2>Bugünlük bu kadar!</h2>
                <p>İyi uykular! Yarın tekrar buluşuruz.</p>
                <p>Sıradaki yayın: <strong><span id="offlineNextTime">--:--</span></strong></p>
            </div>

            <!-- Program arası -->
            <div id="fallbackScreen" class="player__screen hidden">
                <div class="screen-emoji">⏳</div>
                <h2>Çok yakında...</h2>
                <p>Sıradaki yayın: <strong><span id="nextShowTime">--:--</span></strong></p>
            </div>

            <!-- Yükleniyor -->
            <div id="loadingScreen" class="player__screen">
                <div class="screen-emoji spin">📡</div>
                <h2>Yükleniyor...</h2>
            </div>
        </section>

        <aside class="sidebar">
            <article class="now-playing">
                <h3>▶ Şu An</h3>
                <h2 id="currentTitle">—</h2>
                <p id="currentDesc"></p>
            </article>

            <article class="schedule-box">
                <h3>📅 Yayın Akışı</h3>
                <ul id="scheduleList" class="schedule-list"></ul>
            </article>
        </aside>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="app.js"></script>
</body>
</html>
